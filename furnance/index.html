<!DOCTYPE html>
<html>
<head>
  <title>WOS Player Lookup</title>
</head>
<body>
  <h2>WOS Player Lookup</h2>

  <input id="playerId" placeholder="Enter Player ID" />
  <button onclick="lookupPlayer()">Submit</button>

  <div id="result"></div>

  <script>
    async function lookupPlayer() {
      const fid = document.getElementById("playerId").value.trim();
      const result = document.getElementById("result");

      result.innerHTML = "Loading...";

      const res = await fetch("https://nhoktenz-wos-api.vercel.app/api/player", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ fid })
      });

      const data = await res.json();

      if (data.error) {
        result.innerHTML = `<p style="color:red;">${data.error}</p>`;
        return;
      }

      const player = data.data;

    if (!player) {
    result.innerHTML = `<p style="color:red;">Player not found</p>`;
    return;
    }

    const furnaceDisplay = player.stove_lv_content?.startsWith("http")
    ? `<img src="${player.stove_lv_content}" width="80" />`
    : player.stove_lv_content || "";

   result.innerHTML = `
  <div style="border:1px solid #ccc;padding:15px;border-radius:10px;width:300px;margin-top:15px;">
    <img src="${player.avatar_image}" width="100" style="border-radius:50%;">
    <h3>${player.nickname}</h3>
    <p><b>Player ID:</b> ${player.fid}</p>
    <p><b>State:</b> ${player.kid}</p>
    <p><b>Furnace Level:</b> ${player.stove_lv}</p>
    <p><b>Furnace:</b> ${furnaceDisplay}</p>
  </div>
`;
    }
  </script>
</body>
</html>
