<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WOS Player Lookup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <body class="bg-dark text-light">

<div class="container py-3 py-md-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6">

            <div class="card bg-secondary shadow-lg">
                <div class="card-body">

                    <h2 class="text-center mb-4">
                        Whiteout Survival Player Lookup
                    </h2>

                    <div class="input-group g-2 mb-3">
                        <div class="col-12 col-sm-8">
                           <input
                            id="playerId"
                            type="text"
                            class="form-control"
                            placeholder="Enter Player ID"                        >
                        </div>
                        
                        <div class="col-12 col-sm-4">
                            <button
                                class="btn btn-warning w-100"
                                onclick="lookupPlayer()"
                            >
                                Search
                            </button>
                        </div>
                    </div>

                    <div id="result"></div>

                </div>
            </div>

        </div>
    </div>
</div>

</body>

  <script>
    async function lookupPlayer() {
      const fid = document.getElementById("playerId").value.trim();
      const result = document.getElementById("result");

      result.innerHTML = "Loading...";

      const res = await fetch("https://nhoktenz-wos-api.vercel.app/api/player", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ fid })
      });

      const data = await res.json();

      if (data.error) {
        result.innerHTML = `<p style="color:red;">${data.error}</p>`;
        return;
      }

      const player = data.data;

    if (!player) {
    result.innerHTML = `<p style="color:red;">Player not found</p>`;
    return;
    }

    const furnaceDisplay = player.stove_lv_content?.startsWith("http")
    ? `<img src="${player.stove_lv_content}" width="80" />`
    : player.stove_lv_content || "";

   result.innerHTML = `
<div class="card bg-dark text-light border-warning mt-3">
    <div class="card-body text-center">

        <img
            src="${player.avatar_image}"
            class="rounded-circle border border-warning mb-3"
            width="120"
            height="120"
        >

        <h3>${player.nickname}</h3>

        <div class="row mt-4">
            <div class="col-6">
                <strong>State</strong>
                <div>#${player.kid}</div>
            </div>

            <div class="col-6">
                <strong>Player ID</strong>
                <div>${player.fid}</div>
            </div>
        </div>

        <hr>

        <div>
            <strong>Furnace Level</strong>
            <div class="mt-2">
                <img src="${player.stove_lv_content}" width="90">
                <div class="mt-2">Level: ${player.fc_level}</div>
            </div>
        </div>

    </div>
</div>
`;
    }
  </script>
</body>
</html>
