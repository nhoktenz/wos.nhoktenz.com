<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiteout Survival - Rally Coordinator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🎯 Rally Coordinator</h1>
        <p class="subtitle">Coordinate your rally attacks to hit the target simultaneously!</p>
        
        <div id="setup-section" class="section">
            <h2>Setup</h2>
            <div class="form-group">
                <label for="numLeaders">How many rally leaders?</label>
                <input type="number" id="numLeaders" min="2" max="10" value="2">
            </div>
            
            <div class="form-group">
                <label for="openRallyTime">Open Rally Time (waiting time before march):</label>
                <select id="openRallyTime">
                    <option value="60">1 minute</option>
                    <option value="180">3 minutes</option>
                    <option value="300">5 minutes</option>
                    <option value="600">10 minutes</option>
                </select>
            </div>
            
            <button onclick="setupLeaders()" class="btn btn-primary">Next</button>
        </div>
        
        <div id="leaders-section" class="section hidden">
            <h2>Rally Leaders Information</h2>
            <div id="leadersInputs"></div>
            <button onclick="addRallyLeader()" class="btn btn-add">+ Add Rally Leader</button>
            <button onclick="calculateTiming()" class="btn btn-primary">Calculate Rally Timing</button>
            <button onclick="reset()" class="btn btn-secondary">Reset</button>
        </div>
        
        <div id="results-section" class="section hidden">
            <h2>📊 Rally Timing Results</h2>
            <div id="results"></div>
            <button onclick="reset()" class="btn btn-secondary">Start Over</button>
        </div>
        
        <footer class="footer">
            <p>Created by <strong>[ADT]『ᴺʰᵒˣᴛᴇɴᴢᴬᴰᵀ༒天ヅ』- 2608</strong></p>
            <p>Made for the Whiteout Survival community ❄️⚔️</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
