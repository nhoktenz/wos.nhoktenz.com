<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiteout Survival - Canyon Clash Team Divider</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🏜️ Canyon Clash Team Divider</h1>
        <p class="subtitle">Input players and auto-divide into 3 equal teams!</p>
        
        <div id="input-section" class="section">
            <h2>Add Players</h2>
            <div class="player-input-group">
                <div class="form-group">
                    <label for="playerName">Player Name:</label>
                    <input type="text" id="playerName" placeholder="Enter player name">
                </div>
                <div class="form-group">
                    <label for="playerPower">Power:</label>
                    <input type="number" id="playerPower" placeholder="Enter power" min="1">
                </div>
                <button onclick="addPlayer()" class="btn btn-add-player">+ Add Player</button>
            </div>

            <div id="playersList" class="players-list"></div>

            <div class="section-actions">
                <button onclick="divideTeams()" class="btn btn-primary" id="divideBtn" disabled>Divide into Teams</button>
                <button onclick="resetPlayers()" class="btn btn-secondary">Clear All</button>
            </div>
        </div>

        <div id="results-section" class="section hidden">
            <h2>🎯 Team Assignments</h2>
            <div id="teamsOutput" class="teams-container"></div>
            <div class="section-actions">
                <button onclick="downloadResults()" class="btn btn-download">⬇ Download Results</button>
                <button onclick="editPlayerList()" class="btn btn-edit-list">✏ Edit Player List</button>
                <button onclick="resetPlayers()" class="btn btn-secondary">Start Over</button>
            </div>
        </div>

        <footer id="sharedFooter" class="footer"></footer>
    </div>

    <script src="../shared/footer-loader.js"></script>
    <script src="script.js"></script>
</body>
</html>
