<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiteout Survival - Canyon Clash Team Divider</title>
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🏜️ Canyon Clash Team Divider</h1>
        <p class="subtitle">Input players and auto-divide into 3 equal teams!</p>
        
        <div id="input-section" class="section">
            <h2>Add Players</h2>
            <div class="player-input-group">
                <div class="form-group">
                    <label for="playerName">Player Name:</label>
                    <input type="text" id="playerName" placeholder="Enter player name">
                </div>
                <div class="form-group">
                    <label for="playerPower">Power:</label>
                    <input type="number" id="playerPower" placeholder="Enter power" min="1">
                </div>
                <div class="form-group">
                    <label>&nbsp;</label>
                    <button onclick="addPlayer()" class="btn btn-add w-100">+ Add Player</button>
                </div>
            </div>

            <div id="playersList" class="players-list"></div>

            <div class="section-actions">
                <button onclick="divideTeams()" class="btn btn-divide" id="divideBtn" disabled>Divide into Teams</button>
                <button onclick="downloadPlayerList()" class="btn btn-save-list">⬇ Save Player List</button>
                <label class="btn btn-load-list">
                    📂 Load Player List
                    <input type="file" id="uploadPlayerList" accept=".json" onchange="uploadPlayerList(event)" style="display:none">
                </label>
                <button onclick="resetPlayers()" class="btn btn-clear-all">Clear All</button>
            </div>
        </div>

        <div id="results-section" class="section hidden">
            <h2>🎯 Team Assignments</h2>
            <div id="teamsOutput" class="teams-container"></div>
            <div class="section-actions">
                <button onclick="downloadResults()" class="btn btn-download-results">⬇ Download Results</button>
                <button onclick="editPlayerList()" class="btn btn-edit-list">✏ Edit Player List</button>
                <button onclick="resetPlayers()" class="btn btn-start-over">Start Over</button>
            </div>
        </div>

        <footer id="sharedFooter" class="footer"></footer>
    </div>

    <script src="../shared/footer-loader.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
</body>
</html>
